<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SF-Life | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Mode Variables */
            --bg-color: #f0f0f5;
            --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.2));
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-highlight: inset 0 1px 1px rgba(255, 255, 255, 0.8), inset 0 -1px 1px rgba(0, 0, 0, 0.05);
            --glass-shadow: 0 24px 40px -10px rgba(0, 0, 0, 0.1);
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* Dark Mode Variables (visionOS style) */
                --bg-color: #000000;
                --glass-bg: linear-gradient(135deg, rgba(40, 40, 45, 0.5), rgba(20, 20, 25, 0.2));
                --glass-border: rgba(255, 255, 255, 0.15);
                --glass-highlight: inset 0 1px 1px rgba(255, 255, 255, 0.2), inset 0 -1px 1px rgba(0, 0, 0, 0.5);
                --glass-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
                --text-main: #f5f5f7;
                --text-secondary: #a1a1a6;
            }
            .gradient-bg { opacity: 0.8; }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            margin: 0;
            overflow: hidden; /* Keep the background blobs contained */
        }

        /* 1:1 Apple Liquid Glass Effect */
        .vision-glass {
            background: var(--glass-bg);
            /* Extreme blur and saturation for that liquid refraction */
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            /* Physical edge simulation */
            border: 1px solid var(--glass-border);
            border-bottom-color: transparent; /* Makes the light hit the top edge */
            box-shadow: var(--glass-shadow), var(--glass-highlight);
            border-radius: 40px;
        }

        /* Abstract Animated Mesh Background to make the glass pop */
        .gradient-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            z-index: -1;
            background: var(--bg-color);
        }
        
        .blob {
            position: absolute;
            filter: blur(90px);
            border-radius: 50%;
            animation: move 20s infinite alternate ease-in-out;
        }

        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: rgba(0, 195, 255, 0.4); }
        .blob-2 { top: 40%; right: -20%; width: 60vw; height: 60vw; background: rgba(0, 85, 255, 0.3); animation-delay: -5s; }
        .blob-3 { bottom: -20%; left: 20%; width: 40vw; height: 40vw; background: rgba(0, 255, 170, 0.3); animation-delay: -10s; }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(10%, 15%) scale(1.2); }
            100% { transform: translate(-10%, -10%) scale(0.9); }
        }

        /* Clean Bezel for Logo */
        .logo-ring {
            background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.05));
            padding: 4px; /* Thickness of the ring */
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1), inset 0 1px 1px rgba(255,255,255,0.5);
        }

        /* Fade in */
        @keyframes scaleUp {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-glass {
            animation: scaleUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative p-6">

    <div class="gradient-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="vision-glass animate-glass w-full max-w-3xl px-8 py-16 md:px-16 md:py-20 flex flex-col items-center text-center z-10 relative">
        
        <div class="mb-8 group">
            <div class="logo-ring transition-transform duration-700 hover:scale-105">
                <img src="logo_se.jpeg" alt="SF-Life Logo" class="w-40 h-40 md:w-48 md:h-48 object-cover rounded-full bg-white">
            </div>
        </div>

        <h2 class="text-xs md:text-sm font-semibold tracking-widest uppercase text-cyan-600 dark:text-cyan-400 mb-4 opacity-90">
            Dataset & Paper
        </h2>
        
        <h1 class="text-5xl md:text-6xl lg:text-7xl font-bold tracking-tight mb-6" style="color: var(--text-main);">
            SF-Life
        </h1>
        
        <p class="text-lg md:text-xl font-medium leading-relaxed max-w-xl mx-auto" style="color: var(--text-secondary);">
            A comprehensive San Francisco Area Simulated Agent Mobility Dataset. 
            Redefining urban dynamics through high-fidelity modeling.
        </p>

        <div class="w-16 h-[2px] rounded-full mt-10 mb-4" style="background: var(--glass-border);"></div>

        <p class="text-xs md:text-sm font-semibold tracking-[0.2em] uppercase mt-2" style="color: var(--text-main);">
            Coming Soon
        </p>
        
    </main>
<footer class="absolute bottom-6 text-xs text-center w-full" style="color: var(--text-secondary);">
        <p>&copy; 2026 SF-Life Project Team. All rights reserved.</p>
    </footer>
</body>
</html>
